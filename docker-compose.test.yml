services:
  test-postgres:
    image: postgres:16.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: cx_harness_test
      POSTGRES_USER: cx_test_user
      POSTGRES_PASSWORD: local_test_password
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - cx-harness-test-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U cx_test_user -d cx_harness_test
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  cx-harness-test-postgres-data:
